# Simple docker-compose deployment (single container, YAML config).
# For Docker Swarm with secrets, see stack.yml instead.
services:
  umleiter:
    image: ghcr.io/lhns/umleitung:latest
    build: .
    restart: unless-stopped
    volumes:
      # Configuration (see config.example.yaml for the full schema).
      - ./umleiter.yaml:/config/umleiter.yaml:ro
      # State: dedup fast path — persistent, backed up.
      # Owner must be uid 65532 (distroless nonroot): chown -R 65532 ./state
      - ./state:/state
    healthcheck:
      test: ["CMD", "/umleiter", "-healthcheck"]
      interval: 60s
      timeout: 5s
      retries: 3
