# Docker Swarm stack for Umleiter.
#
#   docker stack deploy -c stack.yml umleiter
#
# Requires external secrets:
#   printf '%s' 'the-gmail-app-password'    | docker secret create gmail_app_password -
#   printf '%s' 'the-stalwart-app-password' | docker secret create stalwart_app_password -
services:
  umleiter:
    image: ghcr.io/lhns/umleitung:latest
    environment:
      GMAIL_USER: "pierrekisters@gmail.com"
      GMAIL_APP_PASSWORD_FILE: /run/secrets/gmail_app_password
      STALWART_USER: "pierrekisters@lhns.de"
      STALWART_APP_PASSWORD_FILE: /run/secrets/stalwart_app_password
      # STALWART_FOLDER: "Gmail"     # default; change to Archive/INBOX if preferred
      # POLL_INTERVAL: "900"
    volumes:
      # State volume = dedup fast path. Persistent bind mount; back it up
      # before the first big run. Owner must be uid 65532 (distroless nonroot).
      - /srv/mail/umleiter/state:/state
    secrets:
      - gmail_app_password
      - stalwart_app_password
    healthcheck:
      test: ["CMD", "/umleiter", "-healthcheck"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      # Exactly one replica — NEVER scale >1: two instances would both append.
      # (A second instance sharing /state refuses to start via the file lock,
      # but don't rely on that; keep replicas at 1.)
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s

secrets:
  gmail_app_password:
    external: true
  stalwart_app_password:
    external: true
