# Docker Swarm stack for Umleiter.
#
#   docker stack deploy -c stack.yml umleiter
#
# Requires external secrets:
#   printf '%s' 'the-source-password' | docker secret create umleiter_source_password -
#   printf '%s' 'the-dest-password'   | docker secret create umleiter_dest_password -
services:
  umleiter:
    image: ghcr.io/lhns/umleitung:latest
    environment:
      # Example: mirroring a Gmail account into a self-hosted Stalwart server.
      SOURCE_HOST: "imap.gmail.com"
      SOURCE_USER: "user@gmail.com"
      SOURCE_PASSWORD_FILE: /run/secrets/umleiter_source_password
      SOURCE_FOLDER: "[Gmail]/All Mail"
      DEST_HOST: "mail.example.org"
      DEST_USER: "user@example.org"
      DEST_PASSWORD_FILE: /run/secrets/umleiter_dest_password
      DEST_FOLDER: "Mirror"
      # SYNC_LABELS: "true"          # mirror label-folder membership as keywords
      # LABEL_PROPAGATE: "true"      # apply post-copy label changes as keyword deltas
      # ARCHIVE_ROUTING: "true"      # inbox mail -> DEST_FOLDER, archived -> DEST_ARCHIVE_FOLDER
      # DEST_ARCHIVE_FOLDER: "Archive"
      # POLL_INTERVAL: "900"
    volumes:
      # State volume = dedup fast path. Persistent bind mount; back it up
      # before the first big run. Owner must be uid 65532 (distroless nonroot).
      - /srv/mail/umleiter/state:/state
    secrets:
      - umleiter_source_password
      - umleiter_dest_password
    healthcheck:
      test: ["CMD", "/umleiter", "-healthcheck"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      # Exactly one replica — NEVER scale >1: two instances would both append.
      # (A second instance sharing /state refuses to start via the file lock,
      # but don't rely on that; keep replicas at 1.)
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s

secrets:
  umleiter_source_password:
    external: true
  umleiter_dest_password:
    external: true
